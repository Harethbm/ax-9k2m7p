  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

93, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"65639752-e5d7-4e4f-9337-cf96959695cf\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"483aa157-fc1d-4791-a46e-b8e463864f6e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n\n  :root {\n    /* Bank palette — deep midnight with electric indigo */\n    --db-bg: #060A18;\n    --db-bg-2: #0A1226;\n    --db-surface: #111A34;\n    --db-indigo: #3355FF;\n    --db-indigo-glow: #5B78FF;\n    --db-indigo-deep: #1229C4;\n\n    /* Operator palette — emerald with aurora tint */\n    --tx-bg: #01110A;\n    --tx-bg-2: #031A10;\n    --tx-emerald: #2EE7A3;\n    --tx-emerald-deep: #0E9968;\n    --tx-aurora: #5CFFC9;\n\n    /* Universal */\n    --text: #F7F9FF;\n    --muted: rgba(247,249,255,0.52);\n    --dim: rgba(247,249,255,0.32);\n    --faint: rgba(247,249,255,0.12);\n    --line: rgba(247,249,255,0.08);\n  }\n\n  html, body {\n    width: 100%; height: 100%;\n    background: #000;\n    display: flex; align-items: center; justify-content: center;\n    font-family: 'Inter', -apple-system, sans-serif;\n    color: var(--text);\n    overflow: hidden;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n\n  /* Scene stage — a subtle gradient behind the phone */\n  body::before {\n    content: '';\n    position: fixed;\n    inset: 0;\n    background:\n      radial-gradient(ellipse at 20% 20%, rgba(51,85,255,0.08) 0%, transparent 50%),\n      radial-gradient(ellipse at 80% 80%, rgba(46,231,163,0.06) 0%, transparent 50%),\n      #000;\n    z-index: -1;\n  }\n\n  /* Tweaks panel */\n  .tweaks {\n    position: fixed;\n    right: 20px; bottom: 20px;\n    width: 260px;\n    background: rgba(10,14,30,0.92);\n    border: 1px solid rgba(255,255,255,0.1);\n    border-radius: 16px;\n    padding: 14px 16px;\n    backdrop-filter: blur(20px);\n    font-size: 12px;\n    z-index: 1000;\n    display: none;\n  }\n  .tweaks.visible { display: block; }\n  .tweaks h4 {\n    font-family: 'Sora', sans-serif;\n    font-size: 11px;\n    letter-spacing: 1.5px;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.5);\n    margin-bottom: 10px;\n  }\n  .tweaks-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }\n  .tweaks button {\n    background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.1);\n    color: #fff;\n    padding: 6px 10px;\n    border-radius: 8px;\n    font-size: 11px;\n    cursor: pointer;\n    font-family: inherit;\n  }\n  .tweaks button.active {\n    background: rgba(51,85,255,0.25);\n    border-color: rgba(51,85,255,0.5);\n  }\n  .tweaks-row.nav button { flex: 1; }\n\n  /* ──────────── PHONE SHELL ──────────── */\n  .phone-shell {\n    position: relative;\n    width: min(390px, 100vw);\n    height: min(844px, 100vh);\n    background: #000;\n    border-radius: min(54px, 6.5vw);\n    overflow: hidden;\n    box-shadow:\n      0 0 0 1px rgba(255,255,255,0.08),\n      0 0 0 2px rgba(0,0,0,0.9),\n      inset 0 0 0 1.5px rgba(255,255,255,0.04),\n      0 40px 100px rgba(0,0,0,0.9),\n      0 10px 40px rgba(51,85,255,0.15);\n  }\n\n  /* Dynamic island */\n  .dyn-island {\n    position: absolute;\n    top: 11px; left: 50%;\n    transform: translateX(-50%);\n    width: 120px; height: 34px;\n    background: #000;\n    border-radius: 20px;\n    z-index: 150;\n  }\n\n  /* Status bar */\n  .status-bar {\n    position: absolute;\n    top: 0; left: 0; right: 0;\n    height: 54px;\n    display: flex; align-items: center;\n    justify-content: space-between;\n    padding: 0 30px 0 32px;\n    z-index: 100;\n    pointer-events: none;\n  }\n  .status-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }\n  .status-icons { display: flex; align-items: center; gap: 6px; }\n  .status-signal { display: flex; align-items: flex-end; gap: 2px; }\n  .status-signal span { width: 3px; background: #fff; border-radius: 1px; }\n  .status-signal span:nth-child(1) { height: 4px; }\n  .status-signal span:nth-child(2) { height: 7px; }\n  .status-signal span:nth-child(3) { height: 10px; }\n  .status-signal span:nth-child(4) { height: 12px; }\n  .status-battery {\n    width: 25px; height: 12px;\n    border: 1.5px solid rgba(255,255,255,0.7);\n    border-radius: 3.5px;\n    position: relative;\n    padding: 1px;\n  }\n  .status-battery::after {\n    content: '';\n    position: absolute;\n    right: -4px; top: 50%; transform: translateY(-50%);\n    width: 2px; height: 5px;\n    background: rgba(255,255,255,0.5);\n    border-radius: 0 2px 2px 0;\n  }\n  .status-battery-fill { height: 100%; width: 75%; background: #fff; border-radius: 1.5px; }\n\n  /* Home indicator */\n  .home-indicator {\n    position: absolute;\n    bottom: 8px; left: 50%;\n    transform: translateX(-50%);\n    width: 134px; height: 5px;\n    background: rgba(255,255,255,0.3);\n    border-radius: 3px;\n    z-index: 200;\n  }\n\n  /* ──────────── SCENES ──────────── */\n  .scene {\n    position: absolute;\n    inset: 0;\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);\n  }\n  .scene.active {\n    opacity: 1;\n    pointer-events: all;\n  }\n\n  /* Scroll progress chevrons — per-scene */\n  .scene-nav-dots {\n    position: absolute;\n    top: 68px; left: 50%;\n    transform: translateX(-50%);\n    display: flex; gap: 5px;\n    z-index: 90;\n  }\n  .scene-nav-dots span {\n    width: 16px; height: 3px;\n    background: rgba(255,255,255,0.15);\n    border-radius: 2px;\n    transition: all 0.4s ease;\n  }\n  .scene-nav-dots span.active { background: rgba(255,255,255,0.9); width: 22px; }\n  .scene-nav-dots span.past { background: rgba(255,255,255,0.4); }\n\n  /* ──────────── SCENE 0 · INTRO ──────────── */\n  #scene-intro {\n    background:\n      radial-gradient(ellipse 600px 400px at 50% 40%, rgba(51,85,255,0.25) 0%, transparent 60%),\n      radial-gradient(ellipse 400px 600px at 50% 80%, rgba(46,231,163,0.18) 0%, transparent 60%),\n      linear-gradient(180deg, #050918 0%, #02050F 100%);\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    padding: 0 32px;\n    overflow: hidden;\n  }\n\n  /* Starfield */\n  .starfield { position: absolute; inset: 0; overflow: hidden; }\n  .star {\n    position: absolute;\n    width: 2px; height: 2px;\n    background: #fff;\n    border-radius: 50%;\n    opacity: 0;\n    animation: star-twinkle 3s ease-in-out infinite;\n  }\n  @keyframes star-twinkle {\n    0%, 100% { opacity: 0; transform: scale(0.5); }\n    50% { opacity: var(--op, 0.8); transform: scale(1); }\n  }\n\n  /* Orbital rings behind logo */\n  .orbit-wrap {\n    position: absolute;\n    left: 50%; top: 38%;\n    transform: translate(-50%, -50%);\n    width: 320px; height: 320px;\n    pointer-events: none;\n  }\n  .orbit-ring {\n    position: absolute;\n    inset: 0;\n    border-radius: 50%;\n    border: 1px solid rgba(51,85,255,0.15);\n  }\n  .orbit-ring.r2 { inset: 40px; border-color: rgba(46,231,163,0.1); }\n  .orbit-ring.r3 { inset: 80px; border-color: rgba(255,255,255,0.05); }\n  .orbit-node {\n    position: absolute;\n    width: 6px; height: 6px;\n    background: var(--tx-emerald);\n    border-radius: 50%;\n    box-shadow: 0 0 16px rgba(46,231,163,0.8);\n  }\n  .orbit-a { top: 10%; left: 50%; animation: orbit-pulse 2.4s ease-in-out infinite; }\n  .orbit-b { top: 50%; left: 90%; background: var(--db-indigo-glow); box-shadow: 0 0 16px rgba(91,120,255,0.8); animation: orbit-pulse 2.4s ease-in-out infinite 0.6s; }\n  .orbit-c { top: 90%; left: 50%; animation: orbit-pulse 2.4s ease-in-out infinite 1.2s; }\n  .orbit-d { top: 50%; left: 10%; background: var(--db-indigo-glow); box-shadow: 0 0 16px rgba(91,120,255,0.8); animation: orbit-pulse 2.4s ease-in-out infinite 1.8s; }\n  @keyframes orbit-pulse {\n    0%, 100% { transform: scale(1); opacity: 0.8; }\n    50% { transform: scale(1.6); opacity: 1; }\n  }\n\n  .intro-mark {\n    position: relative;\n    width: 92px; height: 92px;\n    margin-bottom: 28px;\n    animation: mark-in 1s cubic-bezier(0.2, 1, 0.3, 1) forwards;\n  }\n  @keyframes mark-in {\n    0% { opacity: 0; transform: scale(0.6); filter: blur(10px); }\n    100% { opacity: 1; transform: scale(1); filter: blur(0); }\n  }\n\n  .intro-badge {\n    display: flex; align-items: center; gap: 8px;\n    background: rgba(255,255,255,0.05);\n    border: 1px solid rgba(255,255,255,0.12);\n    backdrop-filter: blur(8px);\n    border-radius: 100px;\n    padding: 7px 14px;\n    font-size: 10px;\n    font-weight: 600;\n    letter-spacing: 1.8px;\n    color: rgba(255,255,255,0.8);\n    text-transform: uppercase;\n    margin-bottom: 20px;\n    animation: fade-in-up 0.7s ease forwards 0.3s;\n    opacity: 0;\n  }\n  .intro-badge-dot {\n    width: 6px; height: 6px;\n    background: var(--tx-emerald);\n    border-radius: 50%;\n    box-shadow: 0 0 10px var(--tx-emerald);\n    animation: pulse-dot 2s infinite;\n  }\n  @keyframes pulse-dot {\n    0%, 100% { opacity: 1; transform: scale(1); }\n    50% { opacity: 0.4; transform: scale(0.7); }\n  }\n\n  .intro-title {\n    font-family: 'Sora', sans-serif;\n    font-size: 44px;\n    font-weight: 800;\n    text-align: center;\n    line-height: 1.02;\n    letter-spacing: -1.8px;\n    margin-bottom: 14px;\n    animation: fade-in-up 0.8s cubic-bezier(0.2,1,0.3,1) forwards 0.5s;\n    opacity: 0;\n  }\n  .intro-title .shimmer {\n    background: linear-gradient(90deg, var(--db-indigo-glow) 0%, var(--tx-emerald) 100%);\n    -webkit-background-clip: text;\n    background-clip: text;\n    -webkit-text-fill-color: transparent;\n  }\n  .intro-sub {\n    font-size: 15px;\n    color: rgba(255,255,255,0.55);\n    text-align: center;\n    max-width: 280px;\n    line-height: 1.55;\n    animation: fade-in-up 0.8s ease forwards 0.7s;\n    opacity: 0;\n  }\n  @keyframes fade-in-up {\n    from { opacity: 0; transform: translateY(12px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  .intro-cta {\n    margin-top: 36px;\n    display: flex; align-items: center; gap: 8px;\n    font-size: 13px;\n    color: rgba(255,255,255,0.6);\n    font-weight: 500;\n    animation: fade-in-up 0.8s ease forwards 0.9s, bob 2s ease-in-out infinite 1.7s;\n    opacity: 0;\n  }\n  @keyframes bob {\n    0%, 100% { transform: translateY(0); }\n    50% { transform: translateY(4px); }\n  }\n  .intro-chevron {\n    animation: bob 2s ease-in-out infinite 1.7s;\n  }\n\n  /* ──────────── APP CHROME ──────────── */\n  .app-chrome {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    flex-direction: column;\n  }\n  .app-header {\n    display: flex; align-items: center;\n    padding: 62px 22px 14px;\n    gap: 12px;\n  }\n  .app-icon {\n    width: 42px; height: 42px;\n    border-radius: 12px;\n    display: flex; align-items: center; justify-content: center;\n    font-family: 'Sora', sans-serif;\n    font-size: 15px;\n    font-weight: 800;\n    letter-spacing: -0.5px;\n    flex-shrink: 0;\n    position: relative;\n    overflow: hidden;\n  }\n  .app-icon.digibank {\n    background: linear-gradient(135deg, #3355FF 0%, #0D1DA0 100%);\n    box-shadow: 0 6px 20px rgba(51,85,255,0.45), inset 0 1px 0 rgba(255,255,255,0.2);\n  }\n  .app-icon.digibank::after {\n    content: '';\n    position: absolute;\n    top: -50%; left: -50%;\n    width: 100%; height: 200%;\n    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);\n    transform: rotate(20deg);\n  }\n  .app-icon.telecomx {\n    background: linear-gradient(135deg, #2EE7A3 0%, #0A7A55 100%);\n    box-shadow: 0 6px 20px rgba(46,231,163,0.4), inset 0 1px 0 rgba(255,255,255,0.25);\n  }\n  .app-name {\n    font-family: 'Sora', sans-serif;\n    font-size: 17px; font-weight: 700;\n    letter-spacing: -0.3px;\n  }\n  .app-tagline {\n    font-size: 11px;\n    color: rgba(255,255,255,0.45);\n    margin-top: 1px;\n    letter-spacing: 0.2px;\n  }\n  .app-ctx {\n    margin-left: auto;\n    display: flex; align-items: center; gap: 6px;\n    font-size: 10px;\n    color: rgba(255,255,255,0.4);\n    font-weight: 500;\n    letter-spacing: 0.3px;\n  }\n  .app-ctx-dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--tx-emerald);\n    box-shadow: 0 0 8px var(--tx-emerald);\n    animation: pulse-dot 2s infinite;\n  }\n\n  .app-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }\n\n  .bottom-nav {\n    height: 78px;\n    display: flex; align-items: flex-start; justify-content: space-around;\n    padding: 12px 8px 0;\n    border-top: 1px solid var(--line);\n    background: rgba(0,0,0,0.3);\n  }\n  .nav-item {\n    display: flex; flex-direction: column; align-items: center; gap: 4px;\n    flex: 1;\n    padding: 4px 0;\n  }\n  .nav-icon-svg { width: 22px; height: 22px; opacity: 0.4; }\n  .nav-item.active .nav-icon-svg { opacity: 1; }\n  .nav-label { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.4); }\n  .nav-item.active .nav-label { color: rgba(255,255,255,0.95); }\n\n  /* ──────────── SCENE 1 · DIGIBANK PROMPT ──────────── */\n  #scene-db-verify {\n    background:\n      radial-gradient(ellipse at 50% 0%, rgba(51,85,255,0.15) 0%, transparent 55%),\n      linear-gradient(180deg, var(--db-bg) 0%, #030715 100%);\n  }\n\n  .tx-summary {\n    margin: 4px 22px 0;\n    background:\n      linear-gradient(180     line-height: 1.5;\n  }\n\n  /* Map: bank → operator visualization */\n  .route-map {\n    position: relative;\n    width: 100%;\n    height: 180px;\n    margin-bottom: 20px;\n  }\n  .route-node {\n    position: absolute;\n    width: 68px; height: 68px;\n    border-radius: 18px;\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    gap: 2px;\n    top: 50%;\n    transform: translateY(-50%);\n  }\n  .route-node.bank {\n    left: 0;\n    background: linear-gradient(135deg, rgba(51,85,255,0.25), rgba(51,85,255,0.1));\n    border: 1px solid rgba(51,85,255,0.4);\n  }\n  .route-node.op {\n    right: 0;\n    background: linear-gradient(135deg, rgba(46,231,163,0.25), rgba(46,231,163,0.08));\n    border: 1px solid rgba(46,231,163,0.4);\n  }\n  .route-node-label {\n    font-family: 'Sora', sans-serif;\n    font-size: 11px;\n    font-weight: 700;\n    letter-spacing: -0.2px;\n  }\n  .route-node .db-mini { color: var(--db-indigo-glow); }\n  .route-node .tx-mini { color: var(--tx-emerald); }\n  .route-node-type {\n    font-size: 8px;\n    letter-spacing: 0.8px;\n    text-transform: uppercase;\n    color: var(--dim);\n    font-weight: 600;\n  }\n\n  .route-line {\n    position: absolute;\n    top: 50%; left: 80px; right: 80px;\n    height: 2px;\n    background: linear-gradient(90deg, rgba(51,85,255,0.3), rgba(46,231,163,0.3));\n    transform: translateY(-50%);\n  }\n  .route-line-progress {\n    position: absolute;\n    inset: 0;\n    background: linear-gradient(90deg, var(--db-indigo-glow), var(--tx-emerald));\n    width: 0;\n    box-shadow: 0 0 12px rgba(46,231,163,0.6);\n    animation: route-fill 2.4s cubic-bezier(0.4,0,0.2,1) forwards;\n    animation-delay: 0.3s;\n  }\n  @keyframes route-fill { to { width: 100%; } }\n\n  .route-packet {\n    position: absolute;\n    top: 50%;\n    left: 80px;\n    width: 10px; height: 10px;\n    border-radius: 50%;\n    background: #fff;\n    box-shadow: 0 0 16px rgba(255,255,255,0.8), 0 0 32px rgba(46,231,163,0.6);\n    transform: translateY(-50%);\n    animation: packet-travel 1.4s cubic-bezier(0.5,0,0.5,1) infinite;\n    animation-delay: 0.5s;\n  }\n  @keyframes packet-travel {\n    0% { left: 80px; opacity: 0; }\n    15% { opacity: 1; }\n    85% { opacity: 1; }\n    100% { left: calc(100% - 90px); opacity: 0; }\n  }\n\n  /* Phone prefix that detects above */\n  .prefix-reader {\n    position: absolute;\n    top: -42px; left: 50%;\n    transform: translateX(-50%);\n    background: rgba(0,0,0,0.5);\n    border: 1px solid rgba(255,255,255,0.1);\n    border-radius: 12px;\n    padding: 8px 12px;\n    display: flex; align-items: center; gap: 8px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    backdrop-filter: blur(10px);\n  }\n  .prefix-tag {\n    background: rgba(46,231,163,0.15);\n    color: var(--tx-emerald);\n    padding: 2px 6px;\n    border-radius: 4px;\n    font-weight: 600;\n  }\n\n  /* Bottom signal below route */\n  .sig-under {\n    position: absolute;\n    bottom: -38px; left: 50%;\n    transform: translateX(-50%);\n    display: flex; align-items: center; gap: 6px;\n    font-size: 11px;\n    color: var(--muted);\n    font-family: 'JetBrains Mono', monospace;\n  }\n\n  .routing-steps {\n    width: 100%;\n    display: flex; flex-direction: column; gap: 8px;\n    margin-top: 32px;\n  }\n  .routing-step {\n    display: flex; align-items: center; gap: 12px;\n    padding: 12px 14px;\n    background: rgba(255,255,255,0.03);\n    border-radius: 14px;\n    border: 1px solid var(--line);\n    opacity: 0;\n    transform: translateX(-12px);\n    animation: step-in 0.4s cubic-bezier(0.2,1,0.3,1) forwards;\n  }\n  .routing-step:nth-child(1) { animation-delay: 0.2s; }\n  .routing-step:nth-child(2) { animation-delay: 0.8s; }\n  .routing-step:nth-child(3) { animation-delay: 1.4s; }\n  @keyframes step-in {\n    to { opacity: 1; transform: translateX(0); }\n  }\n  .step-icon-box {\n    width: 32px; height: 32px;\n    border-radius: 10px;\ rop-filter: blur(10px);\n    box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 1px rgba(46,231,163,0.1);\n    transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);\n  }\n  .binding-chip.lit {\n    opacity: 1;\n    transform: scale(1);\n    background: linear-gradient(135deg, rgba(46,231,163,0.2), rgba(14,153,104,0.1));\n    border-color: var(--tx-emerald);\n    box-shadow: 0 0 20px rgba(46,231,163,0.4), 0 4px 16px rgba(0,0,0,0.5);\n  }\n  .binding-chip-dot {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--tx-emerald);\n    box-shadow: 0 0 8px var(--tx-emerald);\n  }\n  /* Counter-rotate text to stay upright */\n  .binding-chip { animation: orbit-counter 30s linear infinite; }\n  @keyframes orbit-counter {\n    to { transform: scale(1) rotate(-360deg); }\n  }\n\n  /* Position each of 5 binding chips around the orbit */\n  .binding-1 { top: -6px; left: 50%; margin-left: -50px; }        /* Device (top) */\n  .binding-2 { top: 25%; right: -38px; }                           /* Identity */\n  .binding-3 { bottom: 25%; right: -22px; }                         /* App */\n  .binding-4 { bottom: -6px; left: 50%; margin-left: -30px; }      /* SIM */\n  .binding-5 { top: 25%; left: -22px; }                             /* KYC */\n\n  /* Face container */\n  .face-frame {\n    position: absolute;\n    inset: 24px;\n    border-radius: 50%;\n    overflow: hidden;\n    background: radial-gradient(ellipse at 50% 40%, #3a2a20 0%, #0a0604 100%);\n    box-shadow:\n      0 0 0 1px rgba(46,231,163,0.15),\n      inset 0 0 40px rgba(0,0,0,0.6);\n  }\n\n  /* Face portrait image */\n  .face-portrait {\n    width: 100%; height: 100%;\n    display: block;\n    filter: contrast(1.05) saturate(0.9);\n  }\n\n  /* Scan line */\n  .scan-line {\n    position: absolute;\n    inset-inline: 24px;\n    height: 3px;\n    background: linear-gradient(90deg, transparent, var(--tx-emerald) 20%, var(--tx-aurora) 50%, var(--tx-emerald) 80%, transparent);\n    top: 24px;\n    animation: s Fdiv>\n<\u002Fdiv>\n\n<!-- Tweaks panel -->\n<div class=\"tweaks\" id=\"tweaksPanel\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tweaks-row nav\">\n    <button onclick=\"prevScene()\">← Prev<\u002Fbutton>\n    <button onclick=\"nextScene()\">Next →<\u002Fbutton>\n  <\u002Fdiv>\n  <div style=\"font-size:10px;color:rgba(255,255,255,0.4);margin:8px 0 4px;letter-spacing:1px;text-transform:uppercase;\">Jump to scene<\u002Fdiv>\n  <div class=\"tweaks-row\" id=\"jumpRow\"><\u002Fdiv>\n  <div style=\"font-size:10px;color:rgba(255,255,255,0.4);margin:8px 0 4px;letter-spacing:1px;text-transform:uppercase;\">Auto-advance<\u002Fdiv>\n  <div class=\"tweaks-row\">\n    <button id=\"autoBtn\" onclick=\"toggleAuto()\">On<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ═══════════════════════════════════════════════════\n   STARFIELD GENERATOR\n   ═══════════════════════════════════════════════════ */\n(function() {\n  const field = document.getElementById('starfield');\n  if (!field) return;\n  for (let i = 0; i < 40; i++) {\n    const s = document.createElement('div');\n    s.className = 'star';\n    s.style.left = Math.random()*100 + '%';\n    s.style.top = Math.random()*100 + '%';\n    s.style.setProperty('--op', (0.3 + Math.random()*0.6).toFixed(2));\n    s.style.animationDelay = (Math.random()*3) + 's';\n    s.style.animationDuration = (2 + Math.random()*3) + 's';\n    field.appendChild(s);\n  }\n})();\n\n/* ═══════════════════════════════════════════════════\n   SCENE STATE MACHINE\n   ═══════════════════════════════════════════════════ */\nconst SCENES = [\n  'scene-intro',\n  'scene-db-verify',\n  'scene-db-verifying',\n  'scene-tx-launch',\n  'scene-tx-identity',\n  'scene-biometric',\n  'scene-db-success',\n  'scene-key-improvement'\n];\n\nconst SCENE_LABELS = ['Intro','Bank prompt','Routing','App switch','TX request','Face scan','Verified','Summary'];\n\nconst AUTO_ADVANCE = [4500, 0, 3400, 2200, 0, 0, 0, 7000];\n// Bank prompt, TX request, Face scan, Verified: manual (button tap)\n\nlet currentSceneIndex = 0;\nlet autoTimer = null;\nlet autoEnabled = true;\n\nfunction showScene(index) {\n  clearTimeout(autoTimer);\n  if (index < 0) index = 0;\n  if (index >= SCENES.length) index = 0;\n  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));\n  const next = document.getElementById(SCENES[index]);\n  currentSceneIndex = index;\n  if (next) {\n    next.classList.add('active');\n    onSceneEnter(index);\n  }\n  // Save position\n  try { localStorage.setItem('av_scene', index); } catch(e) {}\n  // Update counter\n  document.getElementById('sceneCounter').textContent =\n    String(index+1).padStart(2,'0') + ' / ' + String(SCENES.length).padStart(2,'0');\n  updateJumpButtons();\n  if (autoEnabled && AUTO_ADVANCE[index] > 0) {\n    autoTimer = setTimeout(() => nextScene(), AUTO_ADVANCE[index]);\n  }\n}\nfunction nextScene() {\n  showScene((currentSceneIndex + 1) % SCENES.length);\n}\nfunction prevScene() {\n  showScene((currentSceneIndex - 1 + SCENES.length) % SCENES.length);\n}\nfunction tapButton(btn, fn) {\n  btn.style.transform = 'scale(0.97)';\n  setTimeout(() => { btn.style.transform = ''; fn(); }, 120);\n}\n\nfunction onSceneEnter(index) {\n  if (index === 3) {\n    // App switch → auto advance\n    autoTimer = setTimeout(() => nextScene(), 2200);\n  }\n  if (index === 5) {\n    startBiometricScan();\n  }\n}\n\n/* ═══════════════════════════════════════════════════\n   BIOMETRIC SCAN CHOREOGRAPHY\n   ═══════════════════════════════════════════════════ */\nfunction startBiometricScan() {\n  const percentEl = document.getElementById('bioPercent');\n  const statusEl = document.getElementById('bioStatus');\n  const bioDots = document.getElementById('bioDots');\n  bioDots.innerHTML = '';\n\n  // Reset cells & chips\n  document.querySelectorAll('.binding-cell').forEach(c => c.classList.remove('done'));\n  document.querySelectorAll('.binding-chip').forEach(c => c.classList.remove('lit'));\n\n  // Face landmarks (relative to 232x232 inset area)\n  const landmarks = [\n    // Eyes\n    {x:'32%',y:'46%'}, {x:'38%',y:'44%'}, {x:'44%',y:'46%'},\n    {x:'56%',y:'46%'}, {x:'62%',y:'44%'}, {x:'68%',y:'46%'},\n    // Brows\n    {x:'30%',y:'38%'}, {x:'38%',y:'36%'}, {x:'46%',y:'38%'},\n    {x:'54%',y:'38%'}, {x:'62%',y:'36%'}, {x:'70%',y:'38%'},\n    // Nose\n    {x:'50%',y:'55%'}, {x:'50%',y:'62%'}, {x:'47%',y:'65%'},\n    {x:'53%',y:'65%'}, {x:'50%',y:'68%'},\n    // Mouth\n    {x:'42%',y:'74%'}, {x:'46%',y:'73%'}, {x:'50%',y:'72%'},\n    {x:'54%',y:'73%'}, {x:'58%',y:'74%'}, {x:'50%',y:'77%'},\n    // Jaw / cheeks\n    {x:'22%',y:'55%'}, {x:'22%',y:'65%'}, {x:'26%',y:'75%'},\n    {x:'78%',y:'55%'}, {x:'78%',y:'65%'}, {x:'74%',y:'75%'},\n    {x:'50%',y:'84%'}, {x:'40%',y:'82%'}, {x:'60%',y:'82%'},\n  ];\n\n  // Steps drive the status message and binding lights\n  const steps = [\n    { target: 20, status: 'Locking focus…', bindAt: null, delay: 35 },\n    { target: 40, status: 'Device bound', bindAt: 0, delay: 30 },\n    { target: 58, status: 'SIM bound', bindAt: 3, delay: 35 },\n    { target: 74, status: 'App bound', bindAt: 2, delay: 35 },\n    { target: 88, status: 'KYC record bound', bindAt: 4, delay: 40 },\n    { target: 100, status: 'Identity confirmed', bindAt: 1, delay: 45 },\n  ];\n\n  let pct = 0;\n  let stepIndex = 0;\n  let dotIndex = 0;\n\n  function lightBinding(i) {\n    if (i == null) return;\n    const cell = document.querySelector(`.binding-cell[data-cell=\"${i}\"]`);\n    const chip = document.querySelector(`.binding-chip[data-binding=\"${i}\"]`);\n    if (cell) cell.classList.add('done');\n    if (chip) chip.classList.add('lit');\n  }\n\n  function tick() {\n    const step = steps[stepIndex];\n    if (!step) {\n      // Done — auto-advance\n      statusEl.textContent = 'Identity confirmed';\n      setTimeout(() => {\n        if (currentSceneIndex === 5) nextScene();\n      }, 1100);\n      return;\n    }\n    if (pct < step.target) {\n      pct++;\n      percentEl.textContent = pct + '%';\n      statusEl.textContent = step.status;\n      // Add dot every ~3%\n      if (pct % 3 === 0 && dotIndex < landmarks.length) {\n        const lm = landmarks[dotIndex++];\n        const dot = document.createElement('div');\n        dot.className = 'bio-dot';\n        dot.style.left = lm.x;\n        dot.style.top = lm.y;\n        bioDots.appendChild(dot);\n      }\n      setTimeout(tick, step.delay);\n    } else {\n      lightBinding(step.bindAt);\n      stepIndex++;\n      setTimeout(tick, 220);\n    }\n  }\n\n  setTimeout(tick, 500);\n}\n\n/* ═══════════════════════════════════════════════════\n   JUMP BUTTONS\n   ═══════════════════════════════════════════════════ */\nfunction buildJumpButtons() {\n  const row = document.getElementById('jumpRow');\n  if (!row) return;\n  row.innerHTML = '';\n  SCENE_LABELS.forEach((label, i) => {\n    const b = document.createElement('button');\n    b.textContent = (i+1) + '. ' + label;\n    b.style.fontSize = '10px';\n    b.style.flex = '1 0 48%';\n    b.onclick = () => showScene(i);\n    row.appendChild(b);\n  });\n}\nfunction updateJumpButtons() {\n  const row = document.getElementById('jumpRow');\n  if (!row) return;\n  [...row.children].forEach((b, i) => {\n    b.classList.toggle('active', i === currentSceneIndex);\n  });\n}\nbuildJumpButtons();\n\nfunction toggleAuto() {\n  autoEnabled = !autoEnabled;\n  document.getElementById('autoBtn').textContent = autoEnabled ? 'On' : 'Off';\n  document.getElementById('autoBtn').classList.toggle('active', autoEnabled);\n  if (autoEnabled && AUTO_ADVANCE[currentSceneIndex] > 0) {\n    clearTimeout(autoTimer);\n    autoTimer = setTimeout(() => nextScene(), AUTO_ADVANCE[currentSceneIndex]);\n  } else {\n    clearTimeout(autoTimer);\n  }\n}\ndocument.getElementById('autoBtn').classList.add('active');\n\n/* ═══════════════════════════════════════════════════\n   EDIT MODE (TWEAKS)\n   ═══════════════════════════════════════════════════ */\nwindow.addEventListener('message', (e) => {\n  if (!e.data) return;\n  if (e.data.type === '__activate_edit_mode') {\n    document.getElementById('tweaksPanel').classList.add('visible');\n  }\n  if (e.data.type === '__deactivate_edit_mode') {\n    document.getElementById('tweaksPanel').classList.remove('visible');\n  }\n});\n// Announce edit mode availability\ntry {\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n} catch(e) {}\n\n/* ═══════════════════════════════════════════════════\n   KEYBOARD\n   ═══════════════════════════════════════════════════ */\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextScene(); }\n  if (e.key === 'ArrowLeft') { e.preventDefault(); prevScene(); }\n  if (e.key === 'r' || e.key === 'R') { showScene(0); }\n});\n\n/* ═══════════════════════════════════════════════════\n   INIT\n   ═══════════════════════════════════════════════════ */\nlet startIndex = 0;\ntry {\n  const saved = parseInt(localStorage.getItem('av_scene') || '0', 10);\n  if (!isNaN(saved) && saved >= 0 && saved < SCENES.length) startIndex = saved;\n} catch(e) {}\n\nsetTimeout(() => showScene(startIndex), 100);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
